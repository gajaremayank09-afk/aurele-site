# Use DecapBridge PKCE auth (required)
backend:
  name: git-gateway
  repo: gajaremayank09-afk/aurele-site
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/56fd4228-6099-40f4-a32d-58c26f9aa285/pkce
  auth_token_endpoint: /sites/56fd4228-6099-40f4-a32d-58c26f9aa285/token
  gateway_url: https://gateway.decapbridge.com

  # See who did what (optional)
  commit_messages:
    create: Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "categories"
    label: "Categories"
    files:
      - name: "categories"
        label: "Category List"
        file: "categories.json"
        format: "json"
        fields:
          - name: "categories"
            label: "Categories"
            widget: "list"
            collapsed: false
            summary: "{{fields.name}}"
            fields:
              - name: "id"
                label: "ID (used in URLs — lowercase, no spaces, e.g. manteaux)"
                widget: "string"
                hint: "After adding a new category here, also add its ID as an option in the product Category field below."
              - name: "name"
                label: "Display Name"
                widget: "string"
              - name: "tagline"
                label: "Tagline"
                widget: "string"
                required: false

  - name: "products"
    label: "Products"
    files:
      - name: "products"
        label: "Product Catalogue"
        file: "products.json"
        format: "json"
        fields:
          - name: "products"
            label: "Products"
            widget: "list"
            collapsed: true
            summary: "{{fields.name}}"
            fields:
              - name: "id"
                label: "ID (unique number)"
                widget: "number"
              - name: "roman"
                label: "Roman Numeral"
                widget: "string"
                required: false
              - name: "name"
                label: "Name"
                widget: "string"
              - name: "cat"
                label: "Category"
                widget: "select"
                hint: "Must match a Category ID exactly. If you added a new category above, add its ID as an option here too."
                options: ["manteaux", "robes", "maille", "tailleur", "accessoires"]
              - name: "price"
                label: "Price (USD)"
                widget: "number"
              - name: "desc"
                label: "Description"
                widget: "text"
                required: false
              - name: "images"
                label: "Photos"
                widget: "list"
                hint: "Upload one or more photos. The first one is used as the cover image everywhere on the site; all of them appear on the product's own page."
                field:
                  name: "src"
                  label: "Photo"
                  widget: "image"
              - name: "grad"
                label: "Fallback Gradient (CSS, used only if no photos are uploaded)"
                widget: "string"
                required: false

  - name: "media_library"
    label: "General Media"
    files:
      - name: "hero_media"
        label: "Homepage Hero & Lookbook"
        file: "media.json"
        format: "json"
        fields:
          - name: "hero_slides"
            label: "Hero Slideshow Photos"
            widget: "list"
            hint: "Upload one or more photos to auto-slide behind the homepage headline. Leave empty to keep the default dark gradient background."
            field:
              name: "src"
              label: "Photo"
              widget: "image"
          - name: "hero_video"
            label: "Hero Background Video (optional, not currently used)"
            widget: "file"
            required: false
          - name: "lookbook_1"
            label: "Lookbook Image 1"
            widget: "image"
            required: false
          - name: "lookbook_2"
            label: "Lookbook Image 2"
            widget: "image"
            required: false
          - name: "atelier_visual"
            label: "'The House Architecture' Section Image"
            widget: "image"
            required: false
