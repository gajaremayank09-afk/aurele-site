# Use DecapBridge PKCE auth (required)
backend:
  name: git-gateway
  repo: YOUR-GITHUB-USERNAME/YOUR-REPO-NAME
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/YOUR-SITE-ID/pkce
  auth_token_endpoint: /sites/YOUR-SITE-ID/token
  gateway_url: https://gateway.decapbridge.com

  commit_messages:
    create: Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "site_design"
    label: "Site Design (Logo, Colors, Fonts)"
    files:
      - name: "theme"
        label: "Colors & Fonts"
        file: "theme.json"
        format: "json"
        fields:
          - name: "color_theme"
            label: "Color Theme"
            widget: "select"
            hint: "Each option is a matched set of background/text/accent colors, chosen so text always stays readable."
            options: ["Midnight Gold", "Charcoal Rose", "Ink Navy", "Espresso Gold", "Ivory Light"]
          - name: "heading_font"
            label: "Heading Font"
            widget: "select"
            hint: "Used for all titles and headlines across the site."
            options: ["Cormorant Garamond", "Playfair Display", "Marcellus", "EB Garamond"]
          - name: "body_font"
            label: "Body Text Font"
            widget: "select"
            hint: "Used for all paragraph and button text across the site."
            options: ["Inter", "Jost", "Work Sans", "Poppins"]

      - name: "content"
        label: "Logo & Site Text"
        file: "content.json"
        format: "json"
        fields:
          - name: "site_logo"
            label: "Logo Image"
            widget: "image"
            required: false
            hint: "Upload a logo to replace the text wordmark in the header and footer. Leave empty to keep the text version below."
          - name: "site_name"
            label: "Text Wordmark (used if no logo is uploaded)"
            widget: "string"
          - name: "hero_eyebrow"
            label: "Homepage — Small line above the headline"
            widget: "string"
          - name: "hero_headline"
            label: "Homepage — Main Headline"
            widget: "text"
            hint: "Press Enter for a line break."
          - name: "hero_subtext"
            label: "Homepage — Paragraph under the headline"
            widget: "text"
          - name: "atelier_heading"
            label: "\"House Architecture\" section — Heading"
            widget: "string"
          - name: "atelier_paragraph"
            label: "\"House Architecture\" section — Paragraph"
            widget: "text"
          - name: "private_heading"
            label: "\"Private Consultation\" section — Heading"
            widget: "string"
          - name: "private_paragraph"
            label: "\"Private Consultation\" section — Paragraph"
            widget: "text"
          - name: "footer_tagline"
            label: "Footer — Tagline under the logo"
            widget: "string"
          - name: "footer_copyright"
            label: "Footer — Bottom copyright line"
            widget: "string"

  - name: "categories"
    label: "Categories"
    files:
      - name: "categories"
        label: "Category List"
        file: "categories.json"
        format: "json"
        fields:
          - name: "categories"
            label: "Categories"
            widget: "list"
            collapsed: false
            summary: "{{fields.name}}"
            fields:
              - name: "id"
                label: "ID (used in URLs — lowercase, no spaces, e.g. manteaux)"
                widget: "string"
                hint: "After adding a new category here, also add its ID as an option in the product Category field below."
              - name: "name"
                label: "Display Name"
                widget: "string"
              - name: "tagline"
                label: "Tagline"
                widget: "string"
                required: false

  - name: "products"
    label: "Products"
    files:
      - name: "products"
        label: "Product Catalogue"
        file: "products.json"
        format: "json"
        fields:
          - name: "products"
            label: "Products"
            widget: "list"
            collapsed: true
            summary: "{{fields.name}}"
            fields:
              - name: "id"
                label: "ID (unique number)"
                widget: "number"
              - name: "roman"
                label: "Roman Numeral"
                widget: "string"
                required: false
              - name: "name"
                label: "Name"
                widget: "string"
              - name: "cat"
                label: "Category"
                widget: "select"
                hint: "Must match a Category ID exactly. If you added a new category above, add its ID as an option here too."
                options: ["manteaux", "robes", "maille", "tailleur", "accessoires"]
              - name: "price"
                label: "Price (USD)"
                widget: "number"
              - name: "desc"
                label: "Description"
                widget: "text"
                required: false
              - name: "images"
                label: "Photos"
                widget: "list"
                hint: "Upload one or more photos. The first one is used as the cover image everywhere on the site; all of them appear on the product's own page."
                field:
                  name: "src"
                  label: "Photo"
                  widget: "image"
              - name: "grad"
                label: "Fallback Gradient (CSS, used only if no photos are uploaded)"
                widget: "string"
                required: false

  - name: "media_library"
    label: "Homepage Photos"
    files:
      - name: "hero_media"
        label: "Hero Slideshow & Lookbook Photos"
        file: "media.json"
        format: "json"
        fields:
          - name: "hero_slides"
            label: "Hero Slideshow Photos"
            widget: "list"
            hint: "Upload one or more photos to auto-slide behind the homepage headline. Leave empty to keep the current gradient background."
            field:
              name: "src"
              label: "Photo"
              widget: "image"
          - name: "hero_video"
            label: "Hero Background Video (optional, not currently used)"
            widget: "file"
            required: false
          - name: "lookbook_1"
            label: "Lookbook Image 1"
            widget: "image"
            required: false
          - name: "lookbook_2"
            label: "Lookbook Image 2"
            widget: "image"
            required: false
          - name: "atelier_visual"
            label: "'House Architecture' Section Image"
            widget: "image"
            required: false
